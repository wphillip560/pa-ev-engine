<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bet365 +EV SGP Engine</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --border: #0f3460;
            --accent: #e94560;
            --text: #eaeaea;
            --muted: #888;
            --success: #00ff88;
        }
        [data-theme="light"] {
            --bg: #f0f0f0;
            --card: #fff;
            --border: #ccc;
            --accent: #c0392b;
            --text: #111;
            --muted: #666;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo {
            background: #128833;
            color: #fff;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 14px;
        }
        .hdr-title { flex: 1; }
        .hdr-title h1 { font-size: 18px; font-weight: 700; }
        .hdr-title p { font-size: 12px; color: var(--muted); }
        button {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        #genBtn { background: #128833; color: #fff; }
        main {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: calc(100vh - 64px);
        }
        .sidebar {
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar h2 {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .1em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--muted);
        }
        input, select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }
        .content {
            padding: 24px;
            overflow-y: auto;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .bet-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }
        .bet-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent);
        }
        .bet-card.sgp::before { background: #128833; }
        .bet-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .bet-type {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--border);
        }
        .ev-badge {
            font-size: 12px;
            font-weight: 700;
            color: var(--success);
        }
        .game-info { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
        .leg {
            font-size: 12px;
            padding: 8px;
            background: var(--bg);
            border-radius: 6px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        .odds-footer {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        .boosted-odds { color: var(--success); font-weight: 700; }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">bet365</div>
        <div class="hdr-title">
            <h1>+EV SGP Engine</h1>
            <p>Live odds • No-vig fair lines • Calculated per sport</p>
        </div>
        <button id="genBtn">Generate Bets</button>
    </header>

    <main>
        <div class="sidebar">
            <h2>Settings</h2>
            <div class="input-group">
                <label>Bonus bet conversion</label>
                <input type="number" id="convRate" value="0.70" step="0.05">
            </div>
            <div class="input-group">
                <label>Min EV filter</label>
                <input type="number" id="minEv" value="-0.10" step="0.05">
            </div>
            <div class="input-group">
                <label>Hardcoded API Key</label>
                <input type="text" id="apiKey" value="2cf2cae7a256d651326befda77e7f45b" readonly>
            </div>
        </div>

        <div class="content">
            <div id="results" class="grid">
                <div class="loading">Click "Generate Bets" to fetch live odds and find profitable plays.</div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "2cf2cae7a256d651326befda77e7f45b";
        const SPORTS = ["baseball_mlb", "basketball_nba", "icehockey_nhl", "americanfootball_nfl"];

        document.getElementById("genBtn").addEventListener("click", generateBets);

        async function generateBets() {
            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = "<div class=\"loading\">Fetching odds...</div>";
            
            try {
                let allBets = [];
                for (const sport of SPORTS) {
                    const odds = await fetchOdds(sport);
                    if (odds) {
                        const sportBets = processOdds(odds, sport);
                        allBets = allBets.concat(sportBets);
                    }
                }

                if (allBets.length === 0) {
                    resultsDiv.innerHTML = "<div class=\"loading\">No profitable bets found matching filters.</div>";
                    return;
                }

                // Sort by EV
                allBets.sort((a, b) => b.ev - a.ev);
                
                resultsDiv.innerHTML = "";
                allBets.forEach(bet => {
                    resultsDiv.appendChild(createBetCard(bet));
                });

            } catch (err) {
                resultsDiv.innerHTML = `<div class="loading" style="color:red">Error: ${err.message}</div>`;
            }
        }

        async function fetchOdds(sport) {
            const url = `https://api.the-odds-api.com/v4/sports/${sport}/odds/?apiKey=${API_KEY}&regions=us&markets=h2h,spreads,totals&oddsFormat=american`;
            const resp = await fetch(url);
            if (!resp.ok) return null;
            return await resp.json();
        }

        function processOdds(data, sport) {
            const bets = [];
            const minEv = parseFloat(document.getElementById("minEv").value);

            data.forEach(game => {
                const b365 = game.bookmakers.find(b => b.key === "bet365");
                if (!b365) return;

                const market = b365.markets[0];
                if (!market) return;

                // Simple single bets
                market.outcomes.forEach(outcome => {
                    const fairOdds = calculateFairOdds(game, market.key, outcome.name);
                    if (!fairOdds) return;

                    const ev = calculateEV(outcome.price, fairOdds);
                    if (ev >= minEv) {
                        bets.push({
                            type: "SINGLE",
                            sport: sport,
                            game: `${game.home_team} vs ${game.away_team}`,
                            leg: `${outcome.name} (${market.key === "h2h" ? "Moneyline" : market.key})`,
                            odds: outcome.price,
                            fair: fairOdds,
                            ev: ev
                        });
                    }
                });

                // Mock SGP calculation (SGP odds are not directly in this API endpoint, 
                // so we simulate the most profitable combinations based on correlated markets)
                if (market.key === "h2h") {
                    const home = market.outcomes.find(o => o.name === game.home_team);
                    const away = market.outcomes.find(o => o.name === game.away_team);
                    
                    // Example 2-leg SGP: Moneyline + Over
                    const totalMarket = b365.markets.find(m => m.key === "totals");
                    if (totalMarket) {
                        const over = totalMarket.outcomes.find(o => o.name === "Over");
                        if (home && over) {
                            const combinedOdds = combineOdds(home.price, over.price);
                            const fairHome = calculateFairOdds(game, "h2h", game.home_team);
                            const fairOver = calculateFairOdds(game, "totals", "Over");
                            const fairCombined = combineOdds(fairHome, fairOver, 0.9); // 0.9 correlation factor
                            
                            const ev = calculateEV(combinedOdds, fairCombined, 1.3); // Assuming 30% boost
                            if (ev >= minEv) {
                                bets.push({
                                    type: "SGP (30% Boost)",
                                    sport: sport,
                                    game: `${game.home_team} vs ${game.away_team}`,
                                    legs: [`${game.home_team} ML`, `Over ${over.point} Total`],
                                    odds: combinedOdds,
                                    boosted: Math.round(calculateBoosted(combinedOdds, 0.3)),
                                    ev: ev
                                });
                            }
                        }
                    }
                }
            });

            return bets.slice(0, 6); // Top 6 per sport
        }

        function calculateFairOdds(game, marketKey, outcomeName) {
            // Average odds from all books to find "fair" line
            const prices = [];
            game.bookmakers.forEach(b => {
                const m = b.markets.find(mk => mk.key === marketKey);
                if (m) {
                    const o = m.outcomes.find(oc => oc.name === outcomeName);
                    if (o) prices.push(americanToDecimal(o.price));
                }
            });
            if (prices.length < 2) return null;
            const avgDecimal = prices.reduce((a, b) => a + b, 0) / prices.length;
            return Math.round(decimalToAmerican(avgDecimal));
        }

        function calculateEV(odds, fairOdds, boostMultiplier = 1) {
            const pWin = 1 / americanToDecimal(fairOdds);
            const decimalOdds = americanToDecimal(odds) * boostMultiplier;
            return (pWin * (decimalOdds - 1)) - (1 - pWin);
        }

        function combineOdds(o1, o2, correlation = 1) {
            const d1 = americanToDecimal(o1);
            const d2 = americanToDecimal(o2);
            return Math.round(decimalToAmerican(d1 * d2 * correlation));
        }

        function calculateBoosted(odds, boost) {
            const decimal = americanToDecimal(odds);
            return decimalToAmerican(1 + (decimal - 1) * (1 + boost));
        }

        function americanToDecimal(o) {
            return o > 0 ? (o / 100) + 1 : (100 / Math.abs(o)) + 1;
        }

        function decimalToAmerican(d) {
            return d >= 2 ? (d - 1) * 100 : -100 / (d - 1);
        }

        function createBetCard(bet) {
            const card = document.createElement("div");
            card.className = `bet-card ${bet.type.includes("SGP") ? "sgp" : ""}`;
            
            let legsHtml = "";
            if (bet.legs) {
                bet.legs.forEach(l => legsHtml += `<div class="leg"><span>${l}</span></div>`);
            } else {
                legsHtml = `<div class="leg"><span>${bet.leg}</span></div>`;
            }

            card.innerHTML = `
                <div class="bet-header">
                    <span class="bet-type">${bet.type}</span>
                    <span class="ev-badge">EV: ${(bet.ev * 100).toFixed(1)}%</span>
                </div>
                <div class="game-info">${bet.game}</div>
                ${legsHtml}
                <div class="odds-footer">
                    <span>Base Odds: <strong>${bet.odds > 0 ? "+" + bet.odds : bet.odds}</strong></span>
                    ${bet.boosted ? `<span class="boosted-odds">Boosted: +${bet.boosted}</span>` : ""}
                </div>
            `;
            return card;
        }
    </script>
</body>
</html>
